<!DOCTYPE html>
<html>
<head>
    <title>Audio 1</title>
    <style>
        audio::-webkit-media-controls-panel{
            background-color: rgb(44, 62, 95);
        }
    </style>
</head>

<body>
    <audio id="audioAlarma" controls>
        <source src="Audios/alarma.mp3" type="audio/mpeg">
    </audio>

    <script>
        let sonidoAlarma = document.getElementById("audioAlarma");

        setTimeout(function() {
            sonidoAlarma.play()}, 3000);

    </script>
</body>

</html>
