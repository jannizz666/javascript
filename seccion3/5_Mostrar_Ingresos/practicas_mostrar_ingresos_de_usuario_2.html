<!DOCTYPE html>

<head>
    <title>Ingresos de usuario 2</title>
</head>

<body>
    <input type="text" id="inputTexto" value="Tobias Forge">
    <button onclick="mostrarTexto()">Click aqui</button>
    <h1 id="titulo"></h1>
    
    <script>
        function mostrarTexto() {
            let elementoArtista = document.getElementById("inputTexto");
            let elementoTitulo = document.getElementById("titulo");
            let texto = "Mi artista favorito es " + elementoArtista.value

            elementoTitulo.textContent = texto;
        }
    </script>
</body>
</html>
